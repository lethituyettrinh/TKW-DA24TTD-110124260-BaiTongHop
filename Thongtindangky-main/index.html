<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin đăng ký</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../home-button.css">
</head>
<body>
    <a class="home-button" href="../index.html" aria-label="Quay lai trang chu">&larr; Quay l&#7841;i trang ch&#7911;</a>

    <div class="khung">

        <div class="tieude">
            Thông tin đăng ký
        </div>

        <div class="noidung">
            <form>

                <div class="dong">
                    <label>Họ tên:</label>
                    <input type="text" placeholder="Nhập họ tên">
                </div>

                <div class="dong">
                    <label>Ngày sinh:</label>
                    <input type="date">
                </div>

                <div class="dong">
                    <label>Giới tính:</label>
                    <input type="radio" name="gioitinh"> Nam
                    <input class="nu" type="radio" name="gioitinh" > Nữ
                </div>

                <div class="dong">
                    <label>Địa chỉ:</label>
                    <input type="text" placeholder="Nhập địa chỉ">
                </div>

                <div class="dong">
                    <label>MSSV:</label>
                    <input type="text" placeholder="Nhập mã số sinh viên">
                </div>

                <div class="dong">
                    <label>Lớp:</label>
                    <select>
                        <option>DA25TTC</option>
                        <option>DA25TTD</option>
                        <option>DA24TTD</option>
                    </select>
                </div>

                <div class="dong">
                    <label>Số điện thoại:</label>
                    <input type="text" placeholder="Nhập số điện thoại">
                </div>

                <div class="dong">
                    <label>Email:</label>
                    <input type="email" placeholder="Nhập email">
                </div>

                <div class="dong">
                    <label>Ảnh đại diện:</label>            
                    <input type="file">
                </div>

                <div class="dong sothich">
                    <label>Sở trường:</label>

                    <input type="checkbox"> <span>Thiết kế web</span>
                    <input type="checkbox"> <span>Lập trình web</span>
                    <input type="checkbox"> <span>Thành thào tiếng Trung</span>
                </div>

                <div class="mota">
                    <label>Mô tả sơ lược:</label>
                    <textarea></textarea>
                </div>

                <div class="nut">
                    <button type="reset">Hủy bỏ</button>
                    <button type="submit">Đăng ký</button>
                </div>

            </form>
        </div>

    </div>

</body>
</html>
