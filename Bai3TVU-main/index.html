<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e9edf0;
            font-family: Arial;
        }

        .khung-ngoai {
            width: 620px;
            background-color: #e5e8eb;
            margin: 50px auto;
            padding: 40px;
        }

        .khung-dang-nhap {
            width: 500px;
            background-color: white;
            margin: auto;
            border: 1px solid #cccccc;
            border-radius: 4px;
            padding: 20px;
        }

        .logo {
            text-align: center;
        }

        .logo img {
            width: 90px;
            height: 90px;
        }

        .tieude {
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            line-height: 8px;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .dong-nhap {
            display: flex;
            margin-bottom: 10px;
        }

        .dong-nhap input {
            width: 430px;
            padding: 10px;
            border: 1px solid #dddddd;
            outline: none;
        }

        .dong-nhap span {
            width: 45px;
            background-color: #e9ecef;
            border: 1px solid #dddddd;
            border-left: none;
            text-align: center;
            line-height: 38px;
        }

        .dong-nho {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .nho-mat-khau {
            width: 245px;
            font-size: 14px;
        }

        .nut-dang-nhap {
            width: 250px;
            padding: 10px;
            background-color: #0d8df2;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        .nut-sinh-vien {
            width: 100%;
            padding: 11px;
            background-color: #0d8df2;
            color: white;
            border: none;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .nut-giang-vien {
            width: 100%;
            padding: 11px;
            background-color: #df3347;
            color: white;
            border: none;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .quen-mat-khau a {
            color: #0d8df2;
            text-decoration: none;
            font-size: 15px;
        }
    </style>
</head>

<body>

    <div class="khung-ngoai">

        <div class="khung-dang-nhap">

            <div class="logo">
                <img src="TVU.png" alt="Logo TVU">
            </div>

            <div class="tieude">
                <p>PHẦN MỀM TIN HỌC</p>
                <p>ĐÁNH GIÁ KẾT QUẢ RÈN LUYỆN CHO SINH VIÊN CHÍNH QUY</p>
<p>TẠI ĐẠI HỌC TRÀ VINH</p>
            </div>

            <form>

                <div class="dong-nhap">
                    <input type="text" placeholder="Email">
                    <span>✉</span>
                </div>

                <div class="dong-nhap">
                    <input type="password" placeholder="Mật khẩu">
                    <span>🔒</span>
                </div>

                <div class="dong-nho">
                    <div class="nho-mat-khau">
                        <input type="checkbox">
                        <b>Nhớ mật khẩu</b>
                    </div>

                    <button class="nut-dang-nhap" type="button">Đăng nhập</button>
                </div>

                <button class="nut-sinh-vien" type="button">
                    Sinh viên (Đăng nhập bằng Email Microsoft)
                </button>

                <button class="nut-giang-vien" type="button">
                    Giảng viên (Đăng nhập bằng Email TVU)
                </button>

                <div class="quen-mat-khau">
                    <a href="#">Quên mật khẩu?</a>
                </div>

            </form>

        </div>

    </div>

</body>
</html>
